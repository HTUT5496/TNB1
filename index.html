<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ကား ပြင်ဆိုင် - Find trusted car repair shops in Myanmar" />
  <meta name="theme-color" content="#f59e0b" />

  <title>ကား ပြင်ဆိုင် | Car Repair Shop Finder</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <!-- Leaflet Routing Machine CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" crossorigin="" />

  <!-- App CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Favicons (inline SVG emoji fallback) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>" />
</head>
<body>

  <div class="app-wrapper">

    <!-- ═══════════════════════════════════════════
         HEADER
    ═══════════════════════════════════════════ -->
    <header class="app-header" role="banner">
      <div class="header-brand">
        <div class="header-logo" aria-hidden="true">🔧</div>
        <div>
          <h1 class="app-title">ကား <span>ပြင်ဆိုင်</span></h1>
          <p class="app-subtitle" data-i18n="appSubtitle">Find trusted repair shops near you</p>
        </div>
      </div>

      <!-- Language Toggle Button -->
      <button id="langToggle" class="lang-toggle" aria-label="Switch language" data-i18n="langButton">
        မြန်မာ
      </button>
    </header>

    <!-- ═══════════════════════════════════════════
         STEP PROGRESS INDICATOR
    ═══════════════════════════════════════════ -->
    <nav class="steps-bar" role="navigation" aria-label="Progress steps">
      <div class="step-item active">
        <div class="step-num"><span>1</span></div>
        <span class="step-label" data-i18n="stepCar">Car</span>
      </div>
      <div class="step-item">
        <div class="step-num"><span>2</span></div>
        <span class="step-label" data-i18n="stepProblem">Problem</span>
      </div>
      <div class="step-item">
        <div class="step-num"><span>3</span></div>
        <span class="step-label" data-i18n="stepPrice">Price</span>
      </div>
      <div class="step-item">
        <div class="step-num"><span>4</span></div>
        <span class="step-label" data-i18n="stepShops">Shops</span>
      </div>
    </nav>

    <!-- ═══════════════════════════════════════════
         STEP 1: CAR SELECTION
    ═══════════════════════════════════════════ -->
    <section class="section-card" aria-labelledby="step1Heading">
      <div class="section-header">
        <div class="section-icon" aria-hidden="true">🚗</div>
        <h2 class="section-title" id="step1Heading" data-i18n="step1Title">Select Your Car</h2>
      </div>

      <div class="form-row">
        <!-- Car Brand -->
        <div class="form-group">
          <label class="form-label" for="carBrand" data-i18n="selectBrand">
            Select Car Brand
          </label>
          <select id="carBrand" class="form-select" aria-label="Select car brand">
            <option value="">Loading...</option>
          </select>
        </div>

        <!-- Car Model (dynamically loaded) -->
        <div class="form-group">
          <label class="form-label" for="carModel" data-i18n="selectModel">
            Select Car Model
          </label>
          <select id="carModel" class="form-select" disabled aria-label="Select car model">
            <option value="">— Select brand first —</option>
          </select>
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════
         STEP 2: PROBLEM SELECTION + PRICE ESTIMATE
    ═══════════════════════════════════════════ -->
    <section class="section-card" aria-labelledby="step2Heading">
      <div class="section-header">
        <div class="section-icon" aria-hidden="true">⚙️</div>
        <h2 class="section-title" id="step2Heading" data-i18n="step2Title">Describe The Problem</h2>
      </div>

      <div class="form-group">
        <label class="form-label" for="carProblem" data-i18n="selectProblem">
          Select Car Problem
        </label>
        <select id="carProblem" class="form-select" aria-label="Select car problem">
          <option value="">Loading...</option>
        </select>
      </div>

      <!-- Get Price Button -->
      <button id="btnEstimate" class="btn btn-secondary" aria-live="polite">
        💰 <span data-i18n="btnEstimate">Get Price Estimate</span>
      </button>

      <!-- Price Result Box (hidden until estimate loaded) -->
      <div id="priceResult" role="status" aria-live="polite">
        <!-- Populated by JavaScript -->
      </div>
    </section>

    <!-- ═══════════════════════════════════════════
         STEP 3: SHOP SEARCH BUTTON
    ═══════════════════════════════════════════ -->
    <section class="section-card" aria-label="Search repair shops">
      <div class="btn-group">
        <button id="btnSearch" class="btn btn-primary">
          🔍 <span data-i18n="btnSearch">Search Repair Shops</span>
        </button>
        <button id="btnLocation" class="btn btn-location">
          📍 <span data-i18n="btnMyLocation">Use My Location</span>
        </button>
      </div>
      <!-- Location status message -->
      <div id="locationStatus" class="location-status" aria-live="polite"></div>
    </section>

    <!-- ═══════════════════════════════════════════
         STEP 4: RESULTS (hidden until search)
    ═══════════════════════════════════════════ -->
    <div id="shopsSection">

      <!-- Shop List -->
      <section class="section-card" aria-labelledby="step4Heading">
        <div class="section-header">
          <div class="section-icon" aria-hidden="true">🏪</div>
          <h2 class="section-title" id="step4Heading" data-i18n="step4Title">Nearby Repair Shops</h2>
        </div>

        <!-- Shop cards rendered by JavaScript -->
        <div id="shopList" class="shop-grid" role="list" aria-live="polite">
          <!-- Populated by JavaScript -->
        </div>
      </section>

      <!-- Map Section -->
      <section class="section-card" aria-labelledby="mapHeading">
        <div class="section-header">
          <div class="section-icon" aria-hidden="true">🗺️</div>
          <h2 class="section-title" id="mapHeading" data-i18n="mapTitle">Repair Shops Map</h2>
        </div>

        <div class="map-container">
          <!-- Leaflet map rendered here -->
          <div id="map" role="application" aria-label="Map showing repair shops"></div>
          <p class="map-note" data-i18n="mapNote">
            Click a marker to see shop details
          </p>
        </div>

        <!-- ── DIRECTIONS PANEL (hidden until route drawn) ── -->
        <div id="directionsPanel" class="directions-panel">
          <div class="directions-header">
            <div class="directions-title-row">
              <span class="directions-icon">🧭</span>
              <div>
                <div class="directions-label" data-i18n="directionsTo">Directions to</div>
                <div id="directionsShopName" class="directions-shop-name"></div>
              </div>
            </div>
            <div id="directionsSummary" class="directions-summary"></div>
            <div class="directions-header-actions">
              <button class="btn-gmaps" onclick="openGoogleMapsDirections(state.activeShop?.lat, state.activeShop?.lng)" title="Open in Google Maps">
                🗺️ <span data-i18n="openGoogleMaps">Google Maps</span>
              </button>
              <button class="btn-clear-route" onclick="clearRoute()" aria-label="Close directions">✕</button>
            </div>
          </div>
          <div id="directionsSteps" class="directions-steps"></div>
        </div>

      </section>

    </div><!-- /#shopsSection -->

    <!-- ═══════════════════════════════════════════
         FOOTER
    ═══════════════════════════════════════════ -->
    <footer class="app-footer" role="contentinfo">
      <p data-i18n="footerText">ကား ပြင်ဆိုင် • Built with ❤️ for Myanmar drivers</p>
    </footer>

  </div><!-- /.app-wrapper -->

  <!-- ═══════════════════════════════════════════
       SCRIPTS
  ═══════════════════════════════════════════ -->

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <!-- Leaflet Routing Machine -->
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js" crossorigin=""></script>

  <!-- Translation dictionary -->
  <script src="translations.js"></script>

  <!-- Main app logic -->
  <script src="app.js"></script>

</body>
</html>
